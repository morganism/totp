<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TOTP QR Generator</title>

  <!-- QR Code lib -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
      max-width: 700px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      font-family: monospace;
    }
    button {
      margin-top: 16px;
      padding: 10px 16px;
      font-size: 16px;
    }
    pre {
      background: #f6f6f6;
      padding: 10px;
      overflow-x: auto;
    }
    #qr {
      margin-top: 20px;
    }
    #otp {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 4px;
    }
  </style>
</head>

<body>

<h2>TOTP Provisioning Tool</h2>

<label>Issuer</label>
<input id="issuer">

<label>Account</label>
<input id="account">

<label>Secret (Base32)</label>
<input id="secret">

<button onclick="render()">Update</button>

<h3>otpauth URI</h3>
<pre id="uri"></pre>

<div id="qr"></div>

<h3>Current OTP</h3>
<div id="otp">------</div>
<div>Expires in <span id="timer">30</span>s</div>

<script>
/* ================= Base32 ================= */

const BASE32_ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";

function base32Encode(bytes) {
  let bits = 0, value = 0, output = "";
  for (const byte of bytes) {
    value = (value << 8) | byte;
    bits += 8;
    while (bits >= 5) {
      output += BASE32_ALPHABET[(value >>> (bits - 5)) & 31];
      bits -= 5;
    }
  }
  if (bits > 0) {
    output += BASE32_ALPHABET[(value << (5 - bits)) & 31];
  }
  return output;
}

function base32Decode(str) {
  let bits = 0, value = 0, index = 0;
  const output = new Uint8Array(Math.floor(str.length * 5 / 8));
  str = str.replace(/=+$/, "").toUpperCase();

  for (const char of str) {
    const idx = BASE32_ALPHABET.indexOf(char);
    if (idx === -1) continue;
    value = (value << 5) | idx;
    bits += 5;
    if (bits >= 8) {
      output[index++] = (value >>> (bits - 8)) & 255;
      bits -= 8;
    }
  }
  return output.slice(0, index);
}

function generateSecret(length = 20) {
  const bytes = new Uint8Array(length);
  crypto.getRandomValues(bytes);
  return base32Encode(bytes);
}

/* ================= URL Secret ================= */

function getSecretFromURL() {
  const path = window.location.pathname.replace(/^\/+/, "");
  return path ? path.toUpperCase() : null;
}

/* ================= TOTP ================= */

async function generateTOTP(secret, digits = 6, period = 30) {
  const keyData = base32Decode(secret);
  const counter = Math.floor(Date.now() / 1000 / period);

  const buffer = new ArrayBuffer(8);
  new DataView(buffer).setUint32(4, counter);

  const key = await crypto.subtle.importKey(
    "raw",
    keyData,
    { name: "HMAC", hash: "SHA-1" },
    false,
    ["sign"]
  );

  const hmac = new Uint8Array(
    await crypto.subtle.sign("HMAC", key, buffer)
  );

  const offset = hmac[hmac.length - 1] & 0xf;
  const code =
    ((hmac[offset] & 0x7f) << 24) |
    ((hmac[offset + 1] & 0xff) << 16) |
    ((hmac[offset + 2] & 0xff) << 8) |
    (hmac[offset + 3] & 0xff);

  return (code % 10 ** digits).toString().padStart(digits, "0");
}

/* ================= Render ================= */

function render() {
  const issuer = document.getElementById("issuer").value || "issuer";
  const account = document.getElementById("account").value || "account";
  const secret = document.getElementById("secret").value;

  const label = encodeURIComponent(`${issuer}:${account}`);
  const uri =
    `otpauth://totp/${label}` +
    `?secret=${secret}&issuer=${encodeURIComponent(issuer)}`;

  document.getElementById("uri").innerText = uri;

  document.getElementById("qr").innerHTML = "";
  new QRCode(document.getElementById("qr"), {
    text: uri,
    width: 220,
    height: 220
  });
}

/* ================= Live OTP ================= */

async function updateOTP() {
  const secret = document.getElementById("secret").value;
  if (!secret) return;

  const otp = await generateTOTP(secret);
  const remaining = 30 - (Math.floor(Date.now() / 1000) % 30);

  document.getElementById("otp").innerText = otp;
  document.getElementById("timer").innerText = remaining;
}

setInterval(updateOTP, 1000);

/* ================= Init ================= */

(function init() {
  const urlSecret = getSecretFromURL();
  document.getElementById("issuer").value = "issuer";
  document.getElementById("account").value = "account";
  document.getElementById("secret").value =
    urlSecret || generateSecret();

  render();
})();
</script>

</body>
</html>
